<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VIP Customer Registration / VIP 客戶首次預約註冊</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <script>
        // Tailwind 颜色主题定制 (融入开运色：深蓝、黑、金、白、银)
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        navy: {
                            800: '#0F172A', // 深蓝 (属水)
                            900: '#020617', // 极深蓝/近黑 (属水)
                        },
                        gold: {
                            400: '#F59E0B', // 金色 (属金)
                            500: '#D97706', // 丰收金 (属金)
                        },
                        silver: '#E2E8F0' // 银白 (属金)
                    },
                    fontFamily: {
                        sans: ['Inter', 'Microsoft JhengHei', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <style>
        body {
            background-color: #020617; /* 纯黑底色 (属水) */
        }
        .gold-gradient-border {
            position: relative;
        }
        .gold-gradient-border::after {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            border-radius: 1rem;
            padding: 1px;
            background: linear-gradient(to bottom, #F59E0B, #E2E8F0, #0F172A);
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            pointer-events: none;
        }
    </style>
</head>
<body class="text-white font-sans min-h-screen flex flex-col justify-between antialiased">

    <main class="w-full max-w-md mx-auto p-6 flex-grow flex flex-col justify-center">
        <div class="bg-navy-800 rounded-2xl shadow-2xl p-8 gold-gradient-border relative">
            
            <div class="text-center mb-8">
                <h1 id="lblTitle" class="text-2xl font-bold text-white tracking-wide">VIP 客戶首次預約註冊</h1>
                <p id="lblSubtitle" class="text-xs text-gray-400 mt-2">請填寫以下资料以完成註冊</p>
            </div>

            <form id="regForm" onsubmit="handleRegister(event)" class="space-y-5">
                <div>
                    <label id="lblName" class="block text-xs font-semibold text-silver uppercase tracking-wider mb-2">姓名 <span class="text-red-500">*</span></label>
                    <input type="text" id="txtName" required autocomplete="name" placeholder="王小明"
                           class="w-full bg-navy-900 border border-gray-700 rounded-lg px-4 py-3 text-white placeholder-gray-600 focus:outline-none focus:border-gold-400 transition duration-200 text-sm">
                </div>

                <div>
                    <label id="lblPhone" class="block text-xs font-semibold text-silver uppercase tracking-wider mb-2">電話 <span class="text-red-500">*</span></label>
                    <input type="tel" id="txtPhone" required autocomplete="tel" placeholder="0912345678"
                           class="w-full bg-navy-900 border border-gray-700 rounded-lg px-4 py-3 text-white placeholder-gray-600 focus:outline-none focus:border-gold-400 transition duration-200 text-sm">
                </div>

                <div>
                    <label id="lblEmail" class="block text-xs font-semibold text-silver uppercase tracking-wider mb-2">Email <span class="text-red-500">*</span></label>
                    <input type="email" id="txtEmail" required autocomplete="email" placeholder="test@gmail.com"
                           class="w-full bg-navy-900 border border-gray-700 rounded-lg px-4 py-3 text-white placeholder-gray-600 focus:outline-none focus:border-gold-400 transition duration-200 text-sm">
                </div>

                <button type="submit" id="btnSubmit"
                        class="w-full bg-gradient-to-r from-gold-500 to-gold-400 hover:from-gold-400 hover:to-gold-500 text-navy-900 font-bold py-3 px-4 rounded-lg transition duration-200 transform active:scale-95 shadow-lg text-sm mt-2">
                    確認註冊
                </button>
            </form>

        </div>
    </main>

    <footer class="w-full text-center py-4 text-[10px] text-gray-600 tracking-widest uppercase">
        © 2026 Fleet Automation System. Secure & Protected.
    </footer>

    <script>
        let currentLang = 'zh'; 

        // 4国语言文本字典 (已拔除多餘的顯示文字)
        const i18n = {
            zh: {
                title: "VIP 客戶首次預約註冊",
                subtitle: "請填寫以下資料以完成註冊",
                name: "姓名 <span class='text-red-500'>*</span>",
                phone: "電話 <span class='text-red-500'>*</span>",
                email: "Email <span class='text-red-500'>*</span>",
                submit: "確認註冊",
                alertSuccess: "請在 LINE App 中開啟此連結以完成註冊。"
            },
            en: {
                title: "VIP First-Time Registration",
                subtitle: "Please fill out the form below to complete registration",
                name: "Full Name <span class='text-red-500'>*</span>",
                phone: "Phone Number <span class='text-red-500'>*</span>",
                email: "Email Address <span class='text-red-500'>*</span>",
                submit: "Register Now",
                alertSuccess: "Please open this link in the LINE App to complete registration."
            },
            ja: {
                title: "VIP 初回予約登録",
                subtitle: "登録を完了するには、以下のフォームに入力してください",
                name: "お名前 <span class='text-red-500'>*</span>",
                phone: "電話番号 <span class='text-red-500'>*</span>",
                email: "メールアドレス <span class='text-red-500'>*</span>",
                submit: "登録する",
                alertSuccess: "登録を完了するには、LINEアプリでこのリンクを開いてください。"
            },
            ko: {
                title: "VIP 첫 예약 등록",
                subtitle: "등록을 완료하려면 아래 양식을 작성해 주세요",
                name: "이름 <span class='text-red-500'>*</span>",
                phone: "전화번호 <span class='text-red-500'>*</span>",
                email: "이메일 주소 <span class='text-red-500'>*</span>",
                submit: "지금 등록",
                alertSuccess: "등록을 완료하려면 LINE 앱에서 이 링크를 열어주세요."
            }
        };

        document.addEventListener("DOMContentLoaded", function() {
            initLIFF();
        });

        function changeLanguage(lang) {
            currentLang = lang; 
            const t = i18n[lang];
            document.getElementById('lblTitle').innerText = t.title;
            document.getElementById('lblSubtitle').innerText = t.subtitle;
            document.getElementById('lblName').innerHTML = t.name;
            document.getElementById('lblPhone').innerHTML = t.phone;
            document.getElementById('lblEmail').innerHTML = t.email;
            document.getElementById('btnSubmit').innerText = t.submit;
        }

        function initLIFF() {
            // 请在此处替换为您在 LINE Developers 后台申请的真实 LIFF ID
            liff.init({ liffId: "YOUR_LIFF_ID_HERE" })
                .then(() => {
                    console.log("LIFF Initialization Success");
                    
                    const lineLang = liff.getLanguage() || navigator.language || navigator.userLanguage;
                    let defaultLang = 'zh'; 
                    
                    if (lineLang.toLowerCase().startsWith('en')) defaultLang = 'en';
                    else if (lineLang.toLowerCase().startsWith('ja')) defaultLang = 'ja';
                    else if (lineLang.toLowerCase().startsWith('ko')) defaultLang = 'ko';
                    
                    changeLanguage(defaultLang);
                })
                .catch((err) => {
                    console.error("LIFF Initialization Failed", err);
                    changeLanguage('zh');
                });
        }

        function handleRegister(e) {
            e.preventDefault();
            
            // 按下按鈕後立刻改變文字，避免客人重複點擊
            const btnSubmit = document.getElementById('btnSubmit');
            const originalBtnText = btnSubmit.innerText;
            btnSubmit.innerText = "處理中...";
            btnSubmit.disabled = true;

            const name = document.getElementById('txtName').value.trim();
            const phone = document.getElementById('txtPhone').value.trim();
            const email = document.getElementById('txtEmail').value.trim();

            const formattedResult = `[註冊資料]\n姓名：${name}\n電話：${phone}\nEmail：${email}`;
            
            if (liff.isLoggedIn() && liff.isInClient()) {
                liff.sendMessages([{
                    type: 'text',
                    text: formattedResult
                }]).then(() => {
                    // 發送成功後，乾淨俐落地直接關閉視窗
                    liff.closeWindow();
                }).catch((err) => {
                    console.error("Error sending message: ", err);
                    alert("網路連線異常，請稍後再試。");
                    btnSubmit.innerText = originalBtnText;
                    btnSubmit.disabled = false;
                });
            } else {
                alert(i18n[currentLang].alertSuccess);
                btnSubmit.innerText = originalBtnText;
                btnSubmit.disabled = false;
            }
        }
    </script>
</body>
</html>
