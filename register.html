<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VIP Customer Registration / VIP 客戶首次預約註冊</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- LINE LIFF SDK -->
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <!-- Google Fonts: Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <script>
        // Tailwind 颜色主题定制 (融入开运色：深蓝、黑、金、白、银)
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        navy: {
                            800: '#0F172A', // 深蓝 (属水)
                            900: '#020617', // 极深蓝/近黑 (属水)
                        },
                        gold: {
                            400: '#F59E0B', // 金色 (属金)
                            500: '#D97706', // 丰收金 (属金)
                        },
                        silver: '#E2E8F0' // 银白 (属金)
                    },
                    fontFamily: {
                        sans: ['Inter', 'Microsoft JhengHei', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <style>
        body {
            background-color: #020617; /* 纯黑底色 (属水) */
        }
        .gold-gradient-border {
            position: relative;
        }
        .gold-gradient-border::after {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            border-radius: 1rem;
            padding: 1px;
            background: linear-gradient(to bottom, #F59E0B, #E2E8F0, #0F172A);
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            pointer-events: none;
        }
    </style>
</head>
<body class="text-white font-sans min-h-screen flex flex-col justify-between antialiased">

    <!-- Main Container (移除了上方的語言選擇器，讓主體直接置中) -->
    <main class="w-full max-w-md mx-auto p-6 flex-grow flex flex-col justify-center">
        <div class="bg-navy-800 rounded-2xl shadow-2xl p-8 gold-gradient-border relative">
            
            <!-- Header -->
            <div class="text-center mb-8">
                <h1 id="lblTitle" class="text-2xl font-bold text-white tracking-wide">VIP 客戶首次預約註冊</h1>
                <p id="lblSubtitle" class="text-xs text-gray-400 mt-2">請填寫以下资料以完成註冊</p>
            </div>

            <!-- Registration Form -->
            <form id="regForm" onsubmit="handleRegister(event)" class="space-y-5">
                <div>
                    <label id="lblName" class="block text-xs font-semibold text-silver uppercase tracking-wider mb-2">姓名</label>
                    <input type="text" id="txtName" required autocomplete="name" placeholder="王小明"
                           class="w-full bg-navy-900 border border-gray-700 rounded-lg px-4 py-3 text-white placeholder-gray-600 focus:outline-none focus:border-gold-400 transition duration-200 text-sm">
                </div>

                <div>
                    <label id="lblPhone" class="block text-xs font-semibold text-silver uppercase tracking-wider mb-2">電話</label>
                    <input type="tel" id="txtPhone" required autocomplete="tel" placeholder="0912345678"
                           class="w-full bg-navy-900 border border-gray-700 rounded-lg px-4 py-3 text-white placeholder-gray-600 focus:outline-none focus:border-gold-400 transition duration-200 text-sm">
                </div>

                <div>
                    <label id="lblEmail" class="block text-xs font-semibold text-silver uppercase tracking-wider mb-2">Email</label>
                    <input type="email" id="txtEmail" required autocomplete="email" placeholder="test@gmail.com"
                           class="w-full bg-navy-900 border border-gray-700 rounded-lg px-4 py-3 text-white placeholder-gray-600 focus:outline-none focus:border-gold-400 transition duration-200 text-sm">
                </div>

                <button type="submit" id="btnSubmit"
                        class="w-full bg-gradient-to-r from-gold-500 to-gold-400 hover:from-gold-400 hover:to-gold-500 text-navy-900 font-bold py-3 px-4 rounded-lg transition duration-200 transform active:scale-95 shadow-lg text-sm mt-2">
                    確認註冊
                </button>
            </form>

            <!-- Result Output Section (Strict Formatting for Router Password) -->
            <div id="resultBox" class="mt-8 pt-6 border-t border-gray-800 hidden">
                <label id="lblOutput" class="block text-xs font-semibold text-gold-400 uppercase tracking-wider mb-2">產生的資料 (可作為木星/路由器密碼)</label>
                <div class="relative">
                    <textarea id="txtOutput" readonly rows="4" 
                              class="w-full bg-navy-900 border border-gold-500/30 rounded-lg p-3 text-xs text-silver font-mono focus:outline-none resize-none"></textarea>
                    <button onclick="copyToClipboard()" id="btnCopy"
                            class="absolute right-2 bottom-2 bg-navy-800 hover:bg-gray-800 text-gold-400 text-[10px] px-2 py-1 rounded border border-gold-400/50 transition">
                        複製資料
                    </button>
                </div>
                <p id="copySuccess" class="text-[10px] text-green-400 mt-1 hidden">✓ 已成功複製到剪貼簿</p>
            </div>

        </div>
    </main>

    <!-- Footer -->
    <footer class="w-full text-center py-4 text-[10px] text-gray-600 tracking-widest uppercase">
        © 2026 Fleet Automation System. Secure & Protected.
    </footer>

    <!-- Multilingual & LIFF Logic Script -->
    <script>
        let currentLang = 'zh'; // 全局變數紀錄當前語系

        // 4国语言文本字典
        const i18n = {
            zh: {
                title: "VIP 客戶首次預約註冊",
                subtitle: "請填寫以下資料以完成註冊",
                name: "姓名",
                phone: "電話",
                email: "Email",
                submit: "確認註冊",
                output: "產生的資料 (可作為路由器密碼)",
                copy: "複製資料",
                success: "✓ 已成功複製到剪貼簿",
                alertSuccess: "資料已成功格式化！"
            },
            en: {
                title: "VIP First-Time Registration",
                subtitle: "Please fill out the form below to complete registration",
                name: "Full Name",
                phone: "Phone Number",
                email: "Email Address",
                submit: "Register Now",
                output: "Generated Profile (Can be used as Router Password)",
                copy: "Copy Data",
                success: "✓ Copied to clipboard successfully",
                alertSuccess: "Data formatted successfully!"
            },
            ja: {
                title: "VIP 初回予約登録",
                subtitle: "登録を完了するには、以下のフォームに入力してください",
                name: "お名前",
                phone: "電話番号",
                email: "メールアドレス",
                submit: "登録する",
                output: "生成されたデータ (ルーターのパスワードとして使用可能)",
                copy: "データをコピー",
                success: "✓ クリップボードにコピーされました",
                alertSuccess: "データが正常にフォーマットされました！"
            },
            ko: {
                title: "VIP 첫 예약 등록",
                subtitle: "등록을 완료하려면 아래 양식을 작성해 주세요",
                name: "이름",
                phone: "전화번호",
                email: "이메일 주소",
                submit: "지금 등록",
                output: "생성된 데이터 (라우터 비밀번호로 사용 가능)",
                copy: "데이터 복사",
                success: "✓ 클립보드에 복사되었습니다",
                alertSuccess: "데이터가 성공적으로 포맷되었습니다!"
            }
        };

        // 页面初始化
        document.addEventListener("DOMContentLoaded", function() {
            initLanguage();
            initLIFF();
        });

        // 语言初始化侦测
        function initLanguage() {
            const userLang = navigator.language || navigator.userLanguage;
            let defaultLang = 'zh'; // 默认繁中
            
            if (userLang.startsWith('en')) defaultLang = 'en';
            else if (userLang.startsWith('ja')) defaultLang = 'ja';
            else if (userLang.startsWith('ko')) defaultLang = 'ko';
            
            changeLanguage(defaultLang);
        }

        // 切换语言UI
        function changeLanguage(lang) {
            currentLang = lang; // 更新全局語系狀態
            const t = i18n[lang];
            document.getElementById('lblTitle').innerText = t.title;
            document.getElementById('lblSubtitle').innerText = t.subtitle;
            document.getElementById('lblName').innerText = t.name;
            document.getElementById('lblPhone').innerText = t.phone;
            document.getElementById('lblEmail').innerText = t.email;
            document.getElementById('btnSubmit').innerText = t.submit;
            document.getElementById('lblOutput').innerText = t.output;
            document.getElementById('btnCopy').innerText = t.copy;
            document.getElementById('copySuccess').innerText = t.success;
        }

        // LINE LIFF 初始化
        function initLIFF() {
            // 请在此处替换为您在 LINE Developers 后台申请的真实 LIFF ID
            liff.init({ liffId: "YOUR_LIFF_ID_HERE" })
                .then(() => {
                    console.log("LIFF Initialization Success");
                })
                .catch((err) => {
                    console.error("LIFF Initialization Failed", err);
                });
        }

        // 表单提交与严格格式化输出逻辑
        function handleRegister(e) {
            e.preventDefault();
            
            const name = document.getElementById('txtName').value.trim();
            const phone = document.getElementById('txtPhone').value.trim();
            const email = document.getElementById('txtEmail').value.trim();

            // 严格遵循左侧要求的格式输出 (用于作 Router 密码)
            const formattedResult = `[註冊資料]\n姓名：${name}\n電話：${phone}\nEmail：${email}`;
            
            // 显示并填入结果框
            document.getElementById('txtOutput').value = formattedResult;
            document.getElementById('resultBox').classList.remove('hidden');

            // 如果是在 LINE 环境内打开，同步将该注册信息发送给 LINE 机器人后台
            if (liff.isLoggedIn() && liff.isInClient()) {
                liff.sendMessages([{
                    type: 'text',
                    text: formattedResult
                }]).then(() => {
                    liff.closeWindow();
                }).catch((err) => {
                    console.error("Error sending message: ", err);
                    alert(i18n[currentLang].alertSuccess);
                });
            } else {
                alert(i18n[currentLang].alertSuccess);
            }
        }

        // 复制到剪贴簿功能
        function copyToClipboard() {
            const copyText = document.getElementById("txtOutput");
            copyText.select();
            copyText.setSelectionRange(0, 99999); // 针对移动端优化
            navigator.clipboard.writeText(copyText.value);
            
            const successMsg = document.getElementById('copySuccess');
            successMsg.classList.remove('hidden');
            setTimeout(() => {
                successMsg.classList.add('hidden');
            }, 3000);
        }
    </script>
</body>
</html>
