<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Vincent 專車預約 | Airport Transfer</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
        body { 
            background-color: #FDFBF7; 
            padding: 20px; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
        }
        .card { 
            border-radius: 15px; 
            box-shadow: 0 8px 24px rgba(10, 37, 64, 0.08); 
            border: none; 
            background-color: #FFFFFF;
        }
        .btn-primary { 
            background-color: #0A2540; 
            border-color: #0A2540; 
            color: #FFFFFF; 
            width: 100%; 
            border-radius: 10px; 
            font-weight: bold; 
            letter-spacing: 1px; 
            transition: all 0.3s ease; 
        }
        .btn-primary:hover, .btn-primary:active { 
            background-color: #153E75; 
            border-color: #153E75; 
            color: #FFFFFF; 
            box-shadow: 0 4px 12px rgba(10, 37, 64, 0.3); 
        }
    </style>
</head>
<body>

<div class="container max-w-md mx-auto">
    <div class="card p-4">
        <h4 class="text-center mb-4" id="formTitle">📅 機場接送預約單</h4>
        
        <form id="bookingForm">
            <input type="hidden" id="lineUid" name="lineUid">
            <input type="hidden" id="lineName" name="lineName">
            <input type="hidden" id="language" name="language">

            <div class="mb-3">
                <label class="form-label" id="labelTime">預約時間</label>
                <input type="datetime-local" class="form-control" id="pickupTime" required>
            </div>
            
            <div class="mb-3">
                <label class="form-label" id="labelPickup">上車地點</label>
                <input type="text" class="form-control" id="pickupLocation" placeholder="..." required>
            </div>
            
            <div class="mb-3">
                <label class="form-label" id="labelDropoff">下車地點</label>
                <input type="text" class="form-control" id="dropoffLocation" placeholder="..." required>
            </div>
            
            <div class="mb-3">
                <label class="form-label" id="labelFlight">航班號 (選填)</label>
                <input type="text" class="form-control" id="flightNo" placeholder="如：JX840">
            </div>

            <div class="mb-3">
                <label class="form-label" id="labelCarType">車型選擇</label>
                <select class="form-select" id="carType" required>
                    <option value="舒適5人座">舒適5人座 (5-Seater)</option>
                    <option value="豪華9人座">豪華9人座 (9-Seater)</option>
                </select>
            </div>

            <div class="mb-3">
                <label class="form-label" id="labelPax">搭乘人數</label>
                <input type="number" class="form-control" id="pax" min="1" max="8" value="1" required>
            </div>

            <div class="mb-3">
                <label class="form-label" id="labelLuggageMedium">行李 (26吋以下)</label>
                <input type="number" class="form-control" id="luggageMedium" min="0" max="10" value="0" required>
            </div>

            <div class="mb-3">
                <label class="form-label" id="labelLuggageLarge">行李 (28吋以上)</label>
                <input type="number" class="form-control" id="luggageLarge" min="0" max="10" value="0" required>
            </div>

            <div class="mb-4">
                <label class="form-label" id="labelSpecial">特殊需求 (選填)</label>
                <input type="text" class="form-control" id="specialRequest" placeholder="...">
            </div>

            <button type="button" class="btn btn-primary py-2" id="submitBtn" onclick="sendData()">送出預約</button>
        </form>
    </div>
</div>

<script>
    // --- 1. 語系翻譯包 ---
    const i18n = {
        'zh-Hant': {
            title: "📅 機場接送預約單", time: "預約時間", pickup: "上車地點", dropoff: "下車地點",
            flight: "航班號 (選填)", carType: "車型選擇", pax: "搭乘人數", 
            luggageMedium: "行李 (26吋以下)", luggageLarge: "行李 (28吋以上)", 
            special: "特殊需求 (選填)", btn: "送出預約"
        },
        'en': {
            title: "📅 Airport Transfer Booking", time: "Date & Time", pickup: "Pick-up Location", dropoff: "Drop-off Location",
            flight: "Flight No. (Optional)", carType: "Vehicle Type", pax: "Passengers", 
            luggageMedium: "Luggage (Up to 26\")", luggageLarge: "Luggage (28\"+)", 
            special: "Special Requests (Optional)", btn: "Submit Booking"
        },
        'ja': {
            title: "📅 空港送迎予約", time: "予約日時", pickup: "乗車場所", dropoff: "降車場所",
            flight: "便名 (任意)", carType: "車種を選択", pax: "乗車人数", 
            luggageMedium: "荷物 (26インチ以下)", luggageLarge: "荷物 (28インチ以上)", 
            special: "特別なご要望 (任意)", btn: "予約を送信"
        },
        'ko': {
            title: "📅 공항 픽업 예약", time: "예약 시간", pickup: "탑승 장소", dropoff: "하차 장소",
            flight: "항공편 번호 (선택)", carType: "차량 유형", pax: "탑승 인원", 
            luggageMedium: "수하물 (26인치 이하)", luggageLarge: "수하물 (28인치 이상)", 
            special: "요청 사항 (선택)", btn: "예약 전송"
        },
        'th': {
            title: "📅 จองรถรับส่งสนามบิน", time: "วันและเวลา", pickup: "จุดรับ", dropoff: "จุดส่ง",
            flight: "เที่ยวบิน (ไม่บังคับ)", carType: "ประเภทรถ", pax: "จำนวนผู้โดยสาร", 
            luggageMedium: "สัมภาระ (ไม่เกิน 26 นิ้ว)", luggageLarge: "สัมภาระ (28 นิ้วขึ้นไป)", 
            special: "คำขอพิเศษ (ไม่บังคับ)", btn: "ยืนยันการจอง"
        }
    };

    // --- 2. 初始化 LIFF ---
    async function initializeLiff() {
        try {
            await liff.init({ liffId: "2010242759-jtaIBPFs" }); 
            
            if (liff.isLoggedIn()) {
                const profile = await liff.getProfile();
                document.getElementById('lineUid').value = profile.userId;
                document.getElementById('lineName').value = profile.displayName;
                
                const currentUrl = decodeURIComponent(window.location.href).toLowerCase();
                
                let lang = 'zh-Hant'; 
                
                if (currentUrl.includes('lang=en')) {
                    lang = 'en';
                } else if (currentUrl.includes('lang=ja')) {
                    lang = 'ja';
                } else if (currentUrl.includes('lang=ko')) {
                    lang = 'ko';
                } else if (currentUrl.includes('lang=th')) {
                    lang = 'th';
                }
                
                document.getElementById('language').value = lang;
                
                document.getElementById('formTitle').innerText = i18n[lang].title;
                document.getElementById('labelTime').innerText = i18n[lang].time;
                document.getElementById('labelPickup').innerText = i18n[lang].pickup;
                document.getElementById('labelDropoff').innerText = i18n[lang].dropoff;
                document.getElementById('labelFlight').innerText = i18n[lang].flight;
                document.getElementById('labelCarType').innerText = i18n[lang].carType;
                document.getElementById('labelPax').innerText = i18n[lang].pax;
                document.getElementById('labelLuggageMedium').innerText = i18n[lang].luggageMedium;
                document.getElementById('labelLuggageLarge').innerText = i18n[lang].luggageLarge;
                document.getElementById('labelSpecial').innerText = i18n[lang].special;
                document.getElementById('submitBtn').innerText = i18n[lang].btn;
            } else {
                liff.login(); 
            }
        } catch (err) {
            console.error('LIFF 初始化失敗', err);
        }
    }

    // --- 3. 傳送資料給 Make.com ---
    function sendData() {
        const bookingData = {
            uid: document.getElementById('lineUid').value,
            name: document.getElementById('lineName').value,
            lang: document.getElementById('language').value,
            time: document.getElementById('pickupTime').value,
            pickup: document.getElementById('pickupLocation').value,
            dropoff: document.getElementById('dropoffLocation').value,
            flight: document.getElementById('flightNo').value,
            carType: document.getElementById('carType').value, 
            pax: document.getElementById('pax').value,
            luggageMedium: document.getElementById('luggageMedium').value,
            luggageLarge: document.getElementById('luggageLarge').value,
            special: document.getElementById('specialRequest').value
        };

        const MAKE_WEBHOOK_URL = "https://hook.eu1.make.com/ij01j2spxq7cgiebtcvj5ktj7idlhu2k";

        document.getElementById('submitBtn').innerText = "傳送中...";
        document.getElementById('submitBtn').disabled = true;

        fetch(MAKE_WEBHOOK_URL, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(bookingData)
        })
        .then(response => {
            if (response.ok) {
                let successMsg = "預約資料已送出！客服系統將立即為您報價。";
                if(bookingData.lang === 'en') successMsg = "Booking submitted! We will quote you shortly.";
                if(bookingData.lang === 'ja') successMsg = "予約が送信されました！すぐにお見積もりいたします。";
                if(bookingData.lang === 'ko') successMsg = "예약이 전송되었습니다! 곧 견적을 보내드리겠습니다.";
                if(bookingData.lang === 'th') successMsg = "ส่งข้อมูลการจองแล้ว! เราจะเสนอราคาให้คุณเร็วๆ นี้";
                
                alert(successMsg);
                liff.closeWindow(); 
            } else {
                alert("傳送失敗，請稍後再試 / Submission failed, please try again.");
                document.getElementById('submitBtn').innerText = i18n[document.getElementById('language').value].btn;
                document.getElementById('submitBtn').disabled = false;
            }
        })
        .catch(error => {
            console.error("Error:", error);
            alert("網路錯誤，請檢查連線 / Network error, please check connection.");
            document.getElementById('submitBtn').innerText = i18n[document.getElementById('language').value].btn;
            document.getElementById('submitBtn').disabled = false;
        });
    }

    window.onload = initializeLiff;
</script>

</body>
</html>
