<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Vincent 專車預約 | Airport Transfer</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
        body { 
            background-color: #020617; /* 曜石黑底色 (屬水) */
            padding: 20px; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            color: #E2E8F0;
        }
        .container {
            max-width: 500px;
        }
        .card { 
            border-radius: 16px; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.5); 
            background-color: #121A2F; /* 深海藍卡片 (屬水) */
            border: 1px solid rgba(212, 175, 55, 0.2); /* 隱約的金邊 */
            position: relative;
            overflow: hidden;
        }
        /* 頂部金色漸層光條 */
        .card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; height: 4px;
            background: linear-gradient(90deg, #D4AF37, #FDE08B, #D4AF37);
        }
        #formTitle {
            color: #D4AF37;
            font-weight: 700;
            letter-spacing: 1px;
            margin-top: 10px;
        }
        .form-label {
            color: #A0AAB2; /* 銀灰色標籤 (屬金) */
            font-size: 0.85rem;
            font-weight: 600;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }
        .text-gold {
            color: #D4AF37 !important; /* 必填星號改為金色 */
        }
        /* 輸入框深色模式訂製 */
        .form-control, .form-select {
            background-color: #0A1931;
            border: 1px solid #1E2A44;
            color: #FFFFFF;
            border-radius: 8px;
            padding: 10px 15px;
        }
        .form-control:focus, .form-select:focus {
            background-color: #0F203C;
            border-color: #D4AF37;
            color: #FFFFFF;
            box-shadow: 0 0 0 0.25rem rgba(212, 175, 55, 0.25);
        }
        .form-select option {
            background-color: #0A1931;
            color: #FFFFFF;
        }
        ::placeholder {
            color: #4A5B76 !important;
            opacity: 1;
        }
        /* 修正手機瀏覽器自動填寫時的白底衝突 */
        input:-webkit-autofill,
        input:-webkit-autofill:hover, 
        input:-webkit-autofill:focus, 
        input:-webkit-autofill:active{
            -webkit-box-shadow: 0 0 0 30px #0A1931 inset !important;
            -webkit-text-fill-color: white !important;
            transition: background-color 5000s ease-in-out 0s;
        }
        /* 讓日期選擇器的月曆小圖示在黑底上變成白色 */
        ::-webkit-calendar-picker-indicator {
            filter: invert(1);
            cursor: pointer;
            opacity: 0.6;
        }
        ::-webkit-calendar-picker-indicator:hover {
            opacity: 1;
        }
        /* 按鈕尊榮金設計 */
        .btn-primary { 
            background: linear-gradient(135deg, #D4AF37, #F59E0B); /* 漸層金 (屬金) */
            border: none;
            color: #020617; /* 深黑字體 */
            width: 100%; 
            border-radius: 10px; 
            font-weight: bold; 
            letter-spacing: 1px; 
            transition: all 0.3s ease; 
            box-shadow: 0 4px 15px rgba(212, 175, 55, 0.3);
            margin-top: 10px;
        }
        .btn-primary:hover, .btn-primary:active { 
            background: linear-gradient(135deg, #FDE08B, #D4AF37);
            color: #020617; 
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(212, 175, 55, 0.4);
        }
        .btn-primary:disabled {
            background: #4A5B76;
            color: #A0AAB2;
            box-shadow: none;
            transform: none;
        }
    </style>
</head>
<body>

<div class="container mx-auto">
    <div class="card p-4">
        <h4 class="text-center mb-4" id="formTitle">📅 機場接送預約單</h4>
        
        <form id="bookingForm">
            <input type="hidden" id="lineUid" name="lineUid">
            <input type="hidden" id="lineName" name="lineName">
            <input type="hidden" id="language" name="language">
            
            <input type="hidden" id="orderId" name="orderId">
            <input type="hidden" id="formAction" name="formAction" value="new">

            <div class="mb-3">
                <label class="form-label" id="labelTime">預約時間 <span class="text-gold">*</span></label>
                <input type="datetime-local" class="form-control" id="pickupTime" required>
            </div>
            
            <div class="mb-3">
                <label class="form-label" id="labelPickup">上車地點 <span class="text-gold">*</span></label>
                <input type="text" class="form-control" id="pickupLocation" placeholder="..." required>
            </div>
            
            <div class="mb-3">
                <label class="form-label" id="labelDropoff">下車地點 <span class="text-gold">*</span></label>
                <input type="text" class="form-control" id="dropoffLocation" placeholder="..." required>
            </div>
            
            <div class="mb-3">
                <label class="form-label" id="labelFlight">航班號 <span class="text-gold">*</span></label>
                <input type="text" class="form-control" id="flightNo" placeholder="如：JX840" required>
            </div>

            <div class="mb-3">
                <label class="form-label" id="labelCarType">車型選擇</label>
                <select class="form-select" id="carType" required>
                    <option value="舒適5人座">舒適5人座 (5-Seater)</option>
                    <option value="豪華9人座">豪華9人座 (9-Seater)</option>
                </select>
            </div>

            <div class="mb-3">
                <label class="form-label" id="labelPax">搭乘人數</label>
                <input type="number" class="form-control" id="pax" min="1" max="8" value="1" onfocus="if(this.value=='1') this.value='';" onblur="if(this.value=='') this.value='1';" required>
            </div>

            <div class="mb-3">
                <label class="form-label" id="labelLuggageMedium">行李 (26吋以下)</label>
                <input type="number" class="form-control" id="luggageMedium" min="0" max="10" value="0" onfocus="if(this.value=='0') this.value='';" onblur="if(this.value=='') this.value='0';" required>
            </div>

            <div class="mb-3">
                <label class="form-label" id="labelLuggageLarge">行李 (28吋以上)</label>
                <input type="number" class="form-control" id="luggageLarge" min="0" max="10" value="0" onfocus="if(this.value=='0') this.value='';" onblur="if(this.value=='') this.value='0';" required>
            </div>

            <div class="mb-4">
                <label class="form-label" id="labelSpecial">特殊需求 (選填)</label>
                <input type="text" class="form-control" id="specialRequest" placeholder="...">
            </div>

            <button type="button" class="btn btn-primary py-3" id="submitBtn" onclick="sendData()">送出預約</button>
        </form>
    </div>
</div>

<script>
    // --- 1. 語系翻譯包 ---
    const i18n = {
        'zh-Hant': {
            title: "📅 機場接送預約單", time: "預約時間 <span class='text-gold'>*</span>", pickup: "上車地點 <span class='text-gold'>*</span>", dropoff: "下車地點 <span class='text-gold'>*</span>",
            flight: "航班號 <span class='text-gold'>*</span>", carType: "車型選擇", pax: "搭乘人數", 
            luggageMedium: "行李 (26吋以下)", luggageLarge: "行李 (28吋以上)", 
            special: "特殊需求 (選填)", btn: "送出預約"
        },
        'en': {
            title: "📅 Airport Transfer Booking", time: "Date & Time <span class='text-gold'>*</span>", pickup: "Pick-up Location <span class='text-gold'>*</span>", dropoff: "Drop-off Location <span class='text-gold'>*</span>",
            flight: "Flight No. <span class='text-gold'>*</span>", carType: "Vehicle Type", pax: "Passengers", 
            luggageMedium: "Luggage (Up to 26\")", luggageLarge: "Luggage (28\"+)", 
            special: "Special Requests (Optional)", btn: "Submit Booking"
        },
        'ja': {
            title: "📅 空港送迎予約", time: "予約日時 <span class='text-gold'>*</span>", pickup: "乗車場所 <span class='text-gold'>*</span>", dropoff: "降車場所 <span class='text-gold'>*</span>",
            flight: "便名 <span class='text-gold'>*</span>", carType: "車種を選択", pax: "乗車人数", 
            luggageMedium: "荷物 (26インチ以下)", luggageLarge: "荷物 (28インチ以上)", 
            special: "特別なご要望 (任意)", btn: "予約を送信"
        },
        'ko': {
            title: "📅 공항 픽업 예약", time: "예약 시간 <span class='text-gold'>*</span>", pickup: "탑승 장소 <span class='text-gold'>*</span>", dropoff: "하차 장소 <span class='text-gold'>*</span>",
            flight: "항공편 번호 <span class='text-gold'>*</span>", carType: "차량 유형", pax: "탑승 인원", 
            luggageMedium: "수하물 (26인치 이하)", luggageLarge: "수하물 (28인치 이상)", 
            special: "요청 사항 (선택)", btn: "예약 전송"
        },
        'th': {
            title: "📅 จองรถรับส่งสนามบิน", time: "วันและเวลา <span class='text-gold'>*</span>", pickup: "จุดรับ <span class='text-gold'>*</span>", dropoff: "จุดส่ง <span class='text-gold'>*</span>",
            flight: "เที่ยวบิน <span class='text-gold'>*</span>", carType: "ประเภทรถ", pax: "จำนวนผู้โดยสาร", 
            luggageMedium: "สัมภาระ (ไม่เกิน 26 นิ้ว)", luggageLarge: "สัมภาระ (28 นิ้วขึ้นไป)", 
            special: "คำขอพิเศษ (ไม่บังคับ)", btn: "ยืนยันการจอง"
        }
    };

    // --- 2. 初始化 LIFF ---
    async function initializeLiff() {
        try {
            await liff.init({ liffId: "2010242759-jtaIBPFs" }); 
            
            if (liff.isLoggedIn()) {
                const profile = await liff.getProfile();
                document.getElementById('lineUid').value = profile.userId;
                document.getElementById('lineName').value = profile.displayName;
                
                // --- 取得 LINE APP 本身的語系設定 ---
                const lineLang = liff.getLanguage() || navigator.language || navigator.userLanguage;
                let lang = 'zh-Hant'; // 預設繁中
                
                if (lineLang.toLowerCase().startsWith('en')) {
                    lang = 'en';
                } else if (lineLang.toLowerCase().startsWith('ja')) {
                    lang = 'ja';
                } else if (lineLang.toLowerCase().startsWith('ko')) {
                    lang = 'ko';
                } else if (lineLang.toLowerCase().startsWith('th')) {
                    lang = 'th';
                }
                
                document.getElementById('language').value = lang;
                
                // 動態切換畫面文字 (預設為新增模式)
                document.getElementById('formTitle').innerText = i18n[lang].title;
                document.getElementById('labelTime').innerHTML = i18n[lang].time;
                document.getElementById('labelPickup').innerHTML = i18n[lang].pickup;
                document.getElementById('labelDropoff').innerHTML = i18n[lang].dropoff;
                document.getElementById('labelFlight').innerHTML = i18n[lang].flight;
                
                document.getElementById('labelCarType').innerText = i18n[lang].carType;
                document.getElementById('labelPax').innerText = i18n[lang].pax;
                document.getElementById('labelLuggageMedium').innerText = i18n[lang].luggageMedium;
                document.getElementById('labelLuggageLarge').innerText = i18n[lang].luggageLarge;
                document.getElementById('labelSpecial').innerText = i18n[lang].special;
                document.getElementById('submitBtn').innerText = i18n[lang].btn;

                // --- 👇 核心升級：讀取網址參數帶入舊資料 👇 ---
                const urlParams = new URLSearchParams(window.location.search);
                const actionParam = urlParams.get('action');
                
                if (actionParam === 'edit') {
                    // 1. 標記這是一份修改單並帶入訂單ID
                    document.getElementById('formAction').value = "edit";
                    if(urlParams.has('orderId')) document.getElementById('orderId').value = urlParams.get('orderId');
                    
                    // 2. 更改標題為修改模式 (多語系後綴)
                    let editSuffix = " (修改)";
                    if(lang === 'en') editSuffix = " (Edit)";
                    if(lang === 'ja') editSuffix = " (編集)";
                    if(lang === 'ko') editSuffix = " (수정)";
                    if(lang === 'th') editSuffix = " (แก้ไข)";
                    document.getElementById('formTitle').innerText = i18n[lang].title + editSuffix;
                    
                    // 3. 把網址列上的舊資料塞進格子裡
                    if(urlParams.has('time')) document.getElementById('pickupTime').value = urlParams.get('time');
                    if(urlParams.has('pickup')) document.getElementById('pickupLocation').value = urlParams.get('pickup');
                    if(urlParams.has('dropoff')) document.getElementById('dropoffLocation').value = urlParams.get('dropoff');
                    if(urlParams.has('flight')) document.getElementById('flightNo').value = urlParams.get('flight');
                    if(urlParams.has('car')) document.getElementById('carType').value = urlParams.get('car');
                    if(urlParams.has('pax')) document.getElementById('pax').value = urlParams.get('pax');
                    if(urlParams.has('lugM')) document.getElementById('luggageMedium').value = urlParams.get('lugM');
                    if(urlParams.has('lugL')) document.getElementById('luggageLarge').value = urlParams.get('lugL');
                    if(urlParams.has('special')) document.getElementById('specialRequest').value = urlParams.get('special');
                }
                // --- 👆 核心升級結束 👆 ---

            } else {
                liff.login(); 
            }
        } catch (err) {
            console.error('LIFF 初始化失敗', err);
        }
    }

    // --- 3. 傳送資料給 Make.com ---
    function sendData() {
        const form = document.getElementById('bookingForm');
        
        // 【防呆機制】檢查表單內所有帶有 required 屬性的欄位是否都有填寫
        if (!form.reportValidity()) {
            return; // 若沒填寫完整，瀏覽器會自動跳出提示並中斷傳送
        }

        // 👇 核心升級：將 action 與 orderId 包裝進送出的 JSON 裡 👇
        const bookingData = {
            action: document.getElementById('formAction').value,
            orderId: document.getElementById('orderId').value,
            uid: document.getElementById('lineUid').value,
            name: document.getElementById('lineName').value,
            lang: document.getElementById('language').value,
            time: document.getElementById('pickupTime').value,
            pickup: document.getElementById('pickupLocation').value,
            dropoff: document.getElementById('dropoffLocation').value,
            flight: document.getElementById('flightNo').value,
            carType: document.getElementById('carType').value, 
            pax: document.getElementById('pax').value,
            luggageMedium: document.getElementById('luggageMedium').value,
            luggageLarge: document.getElementById('luggageLarge').value,
            special: document.getElementById('specialRequest').value
        };

        const MAKE_WEBHOOK_URL = "https://hook.eu1.make.com/ij01j2spxq7cgiebtcvj5ktj7idlhu2k";

        document.getElementById('submitBtn').innerText = "傳送中...";
        document.getElementById('submitBtn').disabled = true;

        fetch(MAKE_WEBHOOK_URL, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(bookingData)
        })
        .then(response => {
            if (response.ok) {
                let successMsg = "預約資料已送出！客服系統將立即為您安排。";
                if(bookingData.lang === 'en') successMsg = "Booking submitted! We will arrange it shortly.";
                if(bookingData.lang === 'ja') successMsg = "予約が送信されました！すぐに手配いたします。";
                if(bookingData.lang === 'ko') successMsg = "예약이 전송되었습니다! 곧 배차를 준비하겠습니다.";
                if(bookingData.lang === 'th') successMsg = "ส่งข้อมูลการจองแล้ว! เราจะจัดการให้คุณเร็วๆ นี้";
                
                alert(successMsg);
                liff.closeWindow(); 
            } else {
                alert("傳送失敗，請稍後再試 / Submission failed, please try again.");
                document.getElementById('submitBtn').innerText = i18n[document.getElementById('language').value].btn;
                document.getElementById('submitBtn').disabled = false;
            }
        })
        .catch(error => {
            console.error("Error:", error);
            alert("網路錯誤，請檢查連線 / Network error, please check connection.");
            document.getElementById('submitBtn').innerText = i18n[document.getElementById('language').value].btn;
            document.getElementById('submitBtn').disabled = false;
        });
    }

    window.onload = initializeLiff;
</script>

</body>
</html>
